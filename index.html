<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Quick Capture</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="app-header">
        <div class="header-content">
            <h1>📝 Quick Capture</h1>
            <div class="header-actions">
                <button id="searchBtn" class="icon-btn" title="Search">🔍</button>
                <button id="darkModeBtn" class="icon-btn" title="Toggle Dark Mode">🌙</button>
                <button id="settingsBtn" class="icon-btn" title="Settings">⚙️</button>
                <button id="logoutBtn" class="icon-btn" title="Logout">🚪</button>
            </div>
        </div>
    </header>

    <!-- Quick Add Section -->
    <div class="quick-add-section">
        <div class="quick-add-container">
            <input
                type="text"
                id="quickAddInput"
                placeholder="Add a note..."
                autocomplete="off"
            >
            <button id="addItemBtn" class="add-btn">+</button>
        </div>
    </div>

    <!-- Search Section (Hidden by default) -->
    <div id="searchSection" class="search-section" style="display: none;">
        <div class="search-container">
            <input
                type="text"
                id="searchInput"
                placeholder="Search notes..."
                autocomplete="off"
            >
            <button id="closeSearchBtn" class="icon-btn">✕</button>
        </div>
        <div id="searchResults" class="search-results"></div>
    </div>

    <!-- Items Container -->
    <main class="items-container" id="itemsContainer">
        <!-- Items will be dynamically inserted here -->
    </main>

    <!-- Edit Item Modal -->
    <div id="editItemModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Note</h2>
                <button class="close-modal">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="editItemInput">Note</label>
                    <input
                        type="text"
                        id="editItemInput"
                        placeholder="Note text..."
                        autocomplete="off"
                    >
                </div>
                <div class="form-group">
                    <label for="editItemComment">Comment (optional)</label>
                    <textarea
                        id="editItemComment"
                        placeholder="Add details or context..."
                        rows="3"
                        autocomplete="off"
                    ></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button id="deleteEditItemBtn" class="btn-secondary">Delete</button>
                <button id="cancelEditItemBtn" class="btn-secondary">Cancel</button>
                <button id="saveEditItemBtn" class="btn-primary">Save</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="close-modal">✕</button>
            </div>
            <div class="modal-body">
                <div class="settings-section">
                    <h3>Account</h3>
                    <p id="userEmail" class="user-email"></p>
                </div>
                <div class="settings-section">
                    <h3>Data Management</h3>
                    <button id="exportDataBtn" class="btn-secondary full-width">Export All Data (JSON)</button>
                    <button id="importDataBtn" class="btn-secondary full-width">Import Data (JSON)</button>
                    <input type="file" id="importFileInput" accept=".json" style="display: none;">
                    <button id="clearCompletedBtn" class="btn-secondary full-width">Clear Completed Notes</button>
                </div>
            </div>
            <div class="modal-footer">
                <button class="close-modal btn-secondary">Close</button>
            </div>
        </div>
    </div>

    <!-- Loading Indicator -->
    <div id="loadingIndicator" class="loading-indicator">
        <div class="spinner"></div>
        <p>Loading...</p>
    </div>

    <!-- Toast Notifications -->
    <div id="toast" class="toast"></div>

    <!-- Scripts -->
    <script type="module" src="firebase-service.js"></script>
    <script type="module" src="app.js"></script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(registration => {
                        console.log('ServiceWorker registered:', registration.scope);
                    })
                    .catch(error => {
                        console.log('ServiceWorker registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
